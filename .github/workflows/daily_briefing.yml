name: Daily Watchlist Briefing

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. This test run targets 12:05 PM
    # America/New_York during daylight saving time (16:05 UTC).
    - cron: "5 16 * * *"

jobs:
  daily-briefing:
    name: Run watchlist monitor
    runs-on: ubuntu-latest
    env:
      OUTPUT_DIR: outputs
      KEEP_HISTORY: "false"
      NEWS_SOURCES: yahoo,google
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_TO: ${{ secrets.SMTP_TO }}
      SMTP_PORT: "587"
      SMTP_USE_TLS: "true"

    steps:
      - name: Check America/New_York schedule window
        id: schedule_gate
        shell: bash
        run: |
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Run watchlist monitor
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python main.py --market-data-mode yahoo --news-data-mode multi --send-email
