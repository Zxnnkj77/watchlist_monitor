name: Daily Watchlist Briefing

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. This test run targets 11:30 AM
    # America/New_York during daylight saving time (15:30 UTC).
    - cron: "45 15 * * *"

jobs:
  daily-briefing:
    name: Run watchlist monitor
    runs-on: ubuntu-latest
    env:
      OUTPUT_DIR: outputs
      KEEP_HISTORY: "false"
      NEWS_SOURCES: yahoo,google
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_TO: ${{ secrets.SMTP_TO }}
      SMTP_PORT: "587"
      SMTP_USE_TLS: "true"

    steps:
      - name: Check America/New_York schedule window
        id: schedule_gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          schedule="${{ github.event.schedule }}"
          ny_offset="$(TZ=America/New_York date +%z)"

          if [[ "$schedule" == "30 15 * * *" && "$ny_offset" == "-0400" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping schedule '$schedule' because America/New_York offset is $ny_offset."
          fi

      - name: Check out repository
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Run watchlist monitor
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python main.py --market-data-mode yahoo --news-data-mode multi --send-email
