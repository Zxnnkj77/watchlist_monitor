name: Daily Watchlist Briefing

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These two entries cover 8:00 AM America/New_York
    # during daylight saving time (12:00 UTC) and standard time (13:00 UTC).
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"

jobs:
  daily-briefing:
    name: Run watchlist monitor
    runs-on: ubuntu-latest
    env:
      OUTPUT_DIR: outputs
      KEEP_HISTORY: "false"
      NEWS_SOURCES: yahoo,google
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_TO: ${{ secrets.SMTP_TO }}
      SMTP_PORT: "587"
      SMTP_USE_TLS: "true"

    steps:
      - name: Check America/New_York schedule window
        id: schedule_gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_hour="$(TZ=America/New_York date +%H)"
          if [[ "$current_hour" == "08" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping because it is not 8:00 AM America/New_York."
          fi

      - name: Check out repository
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Run watchlist monitor
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python main.py --market-data-mode yahoo --news-data-mode multi --send-email
