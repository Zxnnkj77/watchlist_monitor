name: Daily Watchlist Briefing

on:
  workflow_dispatch:
  schedule:
    # 7:15 AM New York during daylight saving time = 11:15 UTC
    # github usually delays
    # adjust seasonally if you want fixed local time with plain cron
    - cron: "15 11 * * 1-5"

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    env:
      OUTPUT_DIR: outputs
      KEEP_HISTORY: "false"
      NEWS_SOURCES: yahoo,google
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run briefing
        run: python main.py
